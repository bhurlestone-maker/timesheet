<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timesheet</title>
<style>
  body { font-family: Arial, sans-serif; background:#f1efe8; margin:0; padding:20px; }
  .container { max-width: 700px; margin: 0 auto; }
  .card { background:#fff; border:1px solid #ddd; border-radius:8px; padding:20px; margin-bottom:16px; }
  h2 { margin-top:0; text-align:center; }
  label { font-size:13px; color:#555; display:block; margin-bottom:4px; }
  input, select, textarea, button {
    font-size:14px; padding:8px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;
  }
  input, select, textarea { width:100%; margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:8px; text-align:left; border-bottom:1px solid #eee; }
  th { background:#f7f6f2; }
  td input { margin-bottom:0; }
  .total-row { display:flex; justify-content:space-between; align-items:center; margin-top:12px; font-weight:bold; font-size:18px; }
  button#submitBtn, button#loginBtn { width:100%; background:#185fa5; color:#fff; border:none; padding:10px; font-weight:bold; cursor:pointer; }
  button#logoutBtn { background:#fff; cursor:pointer; }
  #status, #loginStatus { font-size:13px; text-align:center; margin-top:8px; min-height:18px; }
  .ok { color:green; }
  .err { color:#c00; }
  .header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  @media (max-width: 600px) {
    table, thead, tbody, th, td, tr { display:block; }
    thead { display:none; }
    tr { border:1px solid #eee; border-radius:6px; margin-bottom:10px; padding:8px; }
    td { border:none; padding:6px 0; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    td::before { content: attr(data-label); font-weight:bold; color:#555; flex:0 0 90px; }
    td input, td select { width:auto; flex:1; }
    .rowTotal { justify-content:flex-end !important; }
    .rowTotal::before { content: ""; }
  }
</style>
</head>
<body>
<div class="container">

  <div id="loginView">
    <div class="card" style="max-width:320px;margin:40px auto;">
      <h2>Timesheet login</h2>
      <label>Name</label>
      <input type="text" id="loginName" placeholder="e.g. John Smith"/>
      <label>PIN</label>
      <input type="password" id="loginPin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric"/>
      <button id="loginBtn">Log in</button>
      <p id="loginStatus"></p>
    </div>
  </div>

  <div id="sheetView" style="display:none">
    <div class="header-row">
      <h2 id="welcomeMsg" style="margin:0"></h2>
      <button id="logoutBtn">Log out</button>
    </div>

    <div class="card">
      <label>Week starting (Mon)</label>
      <select id="weekStart"></select>

      <table>
        <thead>
          <tr>
            <th>Date</th><th>Start</th><th>Finish</th><th>Break (min)</th><th>Notes</th><th>Total</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <div class="total-row">
        <span>Total hours this week</span>
        <span id="weekTotal">0.00</span>
      </div>

      <label style="margin-top:12px">Notes for this period</label>
      <textarea id="periodNotes" rows="3" placeholder="Notes for this period..."></textarea>

      <button id="submitBtn">Submit timesheet</button>
      <p id="status"></p>
    </div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby19NxnVHGUtT2qj9W5mjFqpxQsdh__Qmg50DkBHW9pmqCME7cI5w9a93JKEMNhpd3x9Q/exec";
let currentUser = null;
let currentEmail = null;

async function callApi(payload){
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return res.json();
}

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('loginName').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  const statusEl = document.getElementById('loginStatus');
  if(!name || pin.length !== 4){
    statusEl.textContent = 'Enter your name and 4-digit PIN';
    statusEl.className = 'err';
    return;
  }
  statusEl.textContent = 'Checking...';
  statusEl.className = '';
  try{
    const result = await callApi({action:'login', name, pin});
    if(result.ok){
      currentUser = result.name;
      currentEmail = result.email;
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('sheetView').style.display = 'block';
      document.getElementById('welcomeMsg').textContent = 'Timesheet - ' + currentUser;
      initWeeks();
    } else {
      statusEl.textContent = result.error || 'Invalid name or PIN';
      statusEl.className = 'err';
    }
  } catch(err){
    statusEl.textContent = 'Connection error: ' + err.message;
    statusEl.className = 'err';
  }
});

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  currentUser = null;
  document.getElementById('loginName').value = '';
  document.getElementById('loginPin').value = '';
  document.getElementById('loginStatus').textContent = '';
  document.getElementById('sheetView').style.display = 'none';
  document.getElementById('loginView').style.display = 'block';
});

const rowsEl = document.getElementById('rows');
const weekStartEl = document.getElementById('weekStart');
const weekTotalEl = document.getElementById('weekTotal');

function fmtDate(d){ return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'}); }
function isoDate(d){ return d.toISOString().slice(0,10); }

function mondayOf(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day===0?-6:1) - day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}

function initWeeks(){
  weekStartEl.innerHTML = '';
  const today = new Date();
  const baseMonday = mondayOf(today);
  for(let i=-2;i<=2;i++){
    const m = new Date(baseMonday);
    m.setDate(m.getDate()+i*7);
    const end = new Date(m); end.setDate(end.getDate()+6);
    const opt = document.createElement('option');
    opt.value = isoDate(m);
    opt.textContent = `${fmtDate(m)} - ${fmtDate(end)}`;
    if(i===0) opt.selected = true;
    weekStartEl.appendChild(opt);
  }
  buildRows();
}

function timeToMin(t){
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function calcTotal(start,finish,brk){
  const s = timeToMin(start), f = timeToMin(finish);
  if(s===null || f===null) return 0;
  let mins = f - s - (Number(brk)||0);
  if(mins < 0) mins = 0;
  return mins/60;
}

function updateWeekTotal(){
  let total = 0;
  rowsEl.querySelectorAll('tr').forEach(tr=>{ total += Number(tr.dataset.total||0); });
  weekTotalEl.textContent = total.toFixed(2);
}

function buildRows(){
  rowsEl.innerHTML = '';
  const monday = new Date(weekStartEl.value);
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(d.getDate()+i);
    const tr = document.createElement('tr');
    tr.dataset.date = isoDate(d);
    tr.dataset.total = 0;
    tr.innerHTML = `
      <td data-label="Date">${fmtDate(d)}</td>
      <td data-label="Start"><input type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]" maxlength="5" class="start"/></td>
      <td data-label="Finish"><input type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]" maxlength="5" class="finish"/></td>
      <td data-label="Break (min)"><input type="number" value="0" min="0" step="5" class="brk"/></td>
      <td data-label="Notes"><input type="text" placeholder="optional" class="notes"/></td>
      <td data-label="Total" class="rowTotal" style="text-align:right;font-weight:bold">0.00 hr</td>
    `;
    rowsEl.appendChild(tr);
    const start = tr.querySelector('.start');
    const finish = tr.querySelector('.finish');
    const brk = tr.querySelector('.brk');
    const rowTotal = tr.querySelector('.rowTotal');
    function recalc(){
      const total = calcTotal(start.value, finish.value, brk.value);
      tr.dataset.total = total;
      rowTotal.textContent = total.toFixed(2)+' hr';
      updateWeekTotal();
    }
    [start,finish].forEach(el=>el.addEventListener('input',(e)=>{
      let v = e.target.value.replace(/[^0-9]/g,'');
      if(v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);
      e.target.value = v.slice(0,5);
    }));
    [start,finish,brk].forEach(el=>el.addEventListener('input',recalc));
    recalc();
  }
}

weekStartEl.addEventListener('change', buildRows);

document.getElementById('submitBtn').addEventListener('click', async ()=>{
  const statusEl = document.getElementById('status');
  const data = {
    action: 'submit',
    employee: currentUser,
    email: currentEmail,
    weekStart: weekStartEl.value,
    periodNotes: document.getElementById('periodNotes').value,
    days: []
  };
  rowsEl.querySelectorAll('tr').forEach(tr=>{
    data.days.push({
      date: tr.dataset.date,
      start: tr.querySelector('.start').value,
      finish: tr.querySelector('.finish').value,
      breakMin: tr.querySelector('.brk').value,
      notes: tr.querySelector('.notes').value,
      total: Number(tr.dataset.total).toFixed(2)
    });
  });
  statusEl.textContent = 'Submitting...';
  statusEl.className = '';
  try{
    const result = await callApi(data);
    if(result.ok){
      statusEl.textContent = 'Submitted successfully';
      statusEl.className = 'ok';
    } else {
      statusEl.textContent = result.error || 'Submission failed';
      statusEl.className = 'err';
    }
  } catch(err){
    statusEl.textContent = 'Connection error: ' + err.message;
    statusEl.className = 'err';
  }
});
</script>
</body>
</html>
